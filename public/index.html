<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido - SlotEats</title>
    <style>
        :root {
            --primary: #e84118;
            --secondary: #ff4757;
            --dark: #2f3542;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: #fef2f2; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(232, 65, 24, 0.15); 
            width: 340px; 
            text-align: center; 
        }
        h3 { 
            margin-top: 0;
            margin-bottom: 25px; 
            color: var(--primary); 
            font-size: 32px; 
            font-weight: 800; 
        }
        h3 span { color: var(--dark); }
        .pass-container { position: relative; width: 100%; }
        input { 
            width: 100%; 
            margin: 12px 0; 
            padding: 14px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
        }
        input:focus { border-color: var(--secondary); }
        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--primary);
            font-size: 18px;
            user-select: none;
        }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            margin-top: 10px; 
            transition: 0.3s; 
        }
        .btn-login:hover { background: var(--secondary); transform: translateY(-2px); }
        
        /* Estilos del Modal Flotante */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .unlock-link {
            display: block;
            margin-top: 15px;
            color: #666;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
        .unlock-link:hover { color: var(--primary); text-decoration: underline; }

        .divider { margin: 25px 0; border-bottom: 1px solid #eee; position: relative; }
        .divider span { background: white; padding: 0 15px; position: relative; top: 10px; color: #999; font-size: 14px; }
        
        .btn-register { 
            width: 100%; padding: 14px; background: white; color: var(--primary); 
            border: 2px solid var(--primary); border-radius: 10px; cursor: pointer; 
            font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; 
        }
        .btn-register:hover { background: #fff5f5; border-color: var(--secondary); color: var(--secondary); }
        
        .btn-close { position: absolute; top: 10px; right: 10px; cursor: pointer; border: none; background: none; font-size: 20px; color: #999; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Slot<span>Eats</span></h3>
        
        <form id="loginForm">
            <input type="email" id="emailLogin" placeholder="Correo Electrónico" required>
            <div class="pass-container">
                <input type="password" id="passLogin" placeholder="Contraseña" required>
                <span class="toggle-btn" onclick="togglePassword()">👁️</span>
            </div>
            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <a class="unlock-link" onclick="abrirModal()">¿Cuenta bloqueada? Desbloquear aquí</a>

        <div class="divider"><span>¿Eres nuevo?</span></div>
        <button class="btn-register" onclick="window.location.href='registro.html'">Crear Cuenta</button>
    </div>

    <div id="modalDesbloqueo" class="modal-overlay">
        <div class="modal-content">
            <button class="btn-close" onclick="cerrarModal()">&times;</button>
            <h4 style="color: var(--primary); margin-bottom: 15px;">Desbloquear Cuenta</h4>
            <p style="font-size: 12px; color: #666;">Ingresa los datos enviados a tu correo</p>
            <input type="email" id="emailUnlock" placeholder="Tu Correo" required>
            <input type="text" id="codigoUnlock" placeholder="Código de 6 dígitos" maxlength="6" required>
            <button class="btn-login" onclick="enviarDesbloqueo()">Confirmar Código</button>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passInput = document.getElementById('passLogin');
            const toggleIcon = document.querySelector('.toggle-btn');
            if (passInput.type === "password") {
                passInput.type = "text";
                toggleIcon.innerText = "🔒";
            } else {
                passInput.type = "password";
                toggleIcon.innerText = "👁️";
            }
        }

        // --- LÓGICA DEL MODAL ---
        function abrirModal() { document.getElementById('modalDesbloqueo').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modalDesbloqueo').style.display = 'none'; }

        async function enviarDesbloqueo() {
            const email = document.getElementById('emailUnlock').value;
            const codigo = document.getElementById('codigoUnlock').value;

            if (!email || !codigo) return alert("Por favor llena ambos campos");

            try {
                const response = await fetch('/unlock-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, codigo })
                });
                const result = await response.json();
                alert(result.msg);
                if (response.ok) cerrarModal();
            } catch (error) {
                alert("Error de conexión.");
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailValue = document.getElementById('emailLogin').value;
            const passValue = document.getElementById('passLogin').value;
            const esStaff = emailValue.toLowerCase().endsWith('@sloteats.com');
            const rutaApi = esStaff ? '/login-staff' : '/login';

            try {
                const response = await fetch(rutaApi, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailValue, password: passValue })
                });
                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('sesionActiva', 'true');
                    localStorage.setItem('userNombre', result.nombre); 
                    localStorage.setItem('userEmail', result.email);
                    localStorage.setItem('userTipo', result.tipo);
                    alert("¡Bienvenido " + result.nombre + "!");
                    window.location.href = (result.tipo === 'staff') ? "staff-panel.html" : "home.html";
                } else {
                    alert(result.msg || "Error en el inicio de sesión");
                }
            } catch (error) {
                alert("Error al conectar con el servidor.");
            }
        });
    </script>
</body>
</html>
